name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci:
    uses: open-lobotomy/.github/.github/workflows/dotnet-ci.yml@main
    with:
      solution-file: ConfigurationManager.slnx
      private-references-repo: ${{ vars.PRIVATE_REFERENCES_REPO }}
      collect-coverage: true
      coverage-files: |
        LobCorp.ConfigurationManager.Test/coverage.opencover.xml
      upload-codecov: true
      upload-codacy: true
    secrets:
      PRIVATE_REFERENCES_TOKEN: ${{ secrets.PRIVATE_REFERENCES_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
